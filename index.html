<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的时光</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" loop autoplay playsinline>
        <source src="xiaomeiman.mp3" type="audio/mpeg">
    </audio>
    
    <div class="music-control" id="music-control">
        <span class="music-icon">🎵</span>
    </div>
    
    <div class="menu-control" id="menu-control">
        <span class="menu-icon">☰</span>
    </div>
    
    <div class="menu-overlay" id="menu-overlay">
        <div class="menu-content">
            <button class="menu-close" id="menu-close">✕</button>
            <nav class="menu-nav">
                <a href="#" class="menu-item active" data-page="home">🏠 首页</a>
                <a href="#" class="menu-item" data-page="coupons">💝 恋爱券</a>
            </nav>
        </div>
    </div>
    
    <div class="container" id="page-home">
        <!-- <header class="header">
            <h1 class="title">执子之手，与子偕老</h1>
        </header> -->

        <section class="love-time-section">
                            <h2 class="section-title" id="love-title">福福&老李</h2>

            <div class="love-time-card">
                <div class="time-display">
                    <div class="time-item">
                        <span class="time-number" id="days">0</span>
                        <span class="time-label">天</span>
                    </div>
                    <div class="time-item">
                        <span class="time-number" id="hours">0</span>
                        <span class="time-label">时</span>
                    </div>
                    <div class="time-item">
                        <span class="time-number" id="minutes">0</span>
                        <span class="time-label">分</span>
                    </div>
                    <div class="time-item">
                        <span class="time-number" id="seconds">0</span>
                        <span class="time-label">秒</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="milestones-section">
            <h2 class="section-title">岁月留痕</h2>
            <div class="milestones-carousel">
                <div class="milestones-track" id="milestones-container">
                </div>
                <button class="carousel-btn carousel-prev" id="milestone-prev">❮</button>
                <button class="carousel-btn carousel-next" id="milestone-next">❯</button>
            </div>
        </section>

        <section class="goals-section">
            <h2 class="section-title">共许白头</h2>
            <div class="goals-carousel">
                <div class="goals-track" id="goals-container">
                </div>
                <button class="carousel-btn carousel-prev" id="goal-prev">❮</button>
                <button class="carousel-btn carousel-next" id="goal-next">❯</button>
            </div>
        </section>

        <section class="map-section">
            <h2 class="section-title">山河共赏</h2>
            <div class="map-container">
                <div id="asia-map" class="asia-map"></div>
            </div>
        </section>

        <!-- <footer class="footer">
            <p>💝 愿得一心人，白头不相离 💝</p>
        </footer> -->
    </div>

    </div>
    
    <div class="container page-hidden" id="page-coupons">
        <section class="coupons-section">
            <h2 class="section-title">💝 恋爱券</h2>
            <div class="coupons-tabs">
                <button class="tab-btn active" data-filter="all">全部</button>
                <button class="tab-btn" data-filter="available">未使用</button>
                <button class="tab-btn" data-filter="used">已使用</button>
                <button class="tab-btn refresh-btn" id="refresh-btn">🔄 刷新</button>
            </div>
            <div class="coupons-container" id="coupons-container">
            </div>
        </section>
    </div>

    <div class="qr-modal" id="qr-modal">
        <div class="qr-modal-content">
            <button class="qr-modal-close" id="qr-modal-close">✕</button>
            <h3 class="qr-modal-title">扫码使用按摩券</h3>
            <div class="qr-code" id="qr-code"></div>
            <p class="qr-modal-desc">请扫描二维码使用此券</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.18.0.min.js"></script>
    <script src="oss-config.js"></script>
    <script src="crypto-utils.js"></script>
    <script src="oss-utils.js"></script>
    <script src="app.js"></script>
</body>
</html>
