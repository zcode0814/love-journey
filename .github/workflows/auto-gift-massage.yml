name: Auto Gift Massage Coupon

on:
  schedule:
    # 每周日 UTC 时间 00:00 运行（北京时间周日 08:00）
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      duration:
        description: '按摩时长（分钟）'
        required: true
        default: '5'
        type: string
      title:
        description: '按摩卡标题'
        required: true
        default: '每周按摩卡'
        type: string

jobs:
  gift-massage-coupon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ali-oss

      - name: Run auto gift script
        env:
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_CONFIG_PATH: ${{ secrets.OSS_CONFIG_PATH }}
          COUPON_DURATION: ${{ github.event.inputs.duration || '5' }}
          COUPON_TITLE: ${{ github.event.inputs.title || '每周按摩卡' }}
        run: node scripts/auto-gift-massage.js
